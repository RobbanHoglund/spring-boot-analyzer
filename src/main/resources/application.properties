server.port=8085
spring.web.resources.static-locations=optional:file:./frontend/dist/,classpath:/static/

management.endpoints.web.exposure.include=health,info

# Root directory for per-analysis temporary workspaces.
analyzer.workspace-root=${java.io.tmpdir}/spring-boot-analyzer
# Delete cloned workspaces after analysis completes.
analyzer.cleanup-after-analysis=true
# Keep the workspace on disk when Gradle model analysis fails, so the generated init
# script and cloned repository can be inspected manually for debugging.
analyzer.workspace.keep-on-gradle-failure=false

# Periodically delete stale analyzer workspaces left behind in the workspace root.
analyzer.scheduled-workspace-cleanup.enabled=true

# Delete workspaces older than this age during scheduled cleanup.
analyzer.scheduled-workspace-cleanup.max-age=1d

# How many scheduled cleanup passes to run per day.
analyzer.scheduled-workspace-cleanup.runs-per-day=4

# Enable optional Gradle model analysis. This is build-aware analysis and may execute
# repository-controlled Gradle configuration logic, so static-only remains the default
# request mode unless the client explicitly asks for Gradle model analysis.
analyzer.gradle.enabled=true

# Preferred Gradle execution strategy for build-aware analysis.
# TOOLING_API downloads/uses a specific diagnostic Gradle distribution without requiring
# a globally installed gradle executable.
analyzer.gradle.execution-mode=TOOLING_API

# Explicit diagnostic Gradle version used for Tooling API build-aware analysis.
# Java 25 requires Gradle 9.1.0 or newer.
analyzer.gradle.diagnostic-gradle-version=9.5.0

# Shared cache location for downloaded diagnostic Gradle distributions and user home state.
analyzer.gradle.distribution-cache=${java.io.tmpdir}/spring-boot-analyzer-gradle-distributions

# Environment variables preserved for Gradle model analysis, useful for proxy-aware
# environments where plugins.gradle.org or Maven repos are only reachable through a proxy.
analyzer.gradle.pass-through-environment=HTTP_PROXY,HTTPS_PROXY,NO_PROXY,http_proxy,https_proxy,no_proxy

# When enabled, pass explicit JVM proxy settings into Gradle model analysis.
analyzer.gradle.proxy.enabled=false
analyzer.gradle.proxy.host=
analyzer.gradle.proxy.port=
analyzer.gradle.proxy.username=
analyzer.gradle.proxy.password=

# Optional trust store for Gradle model analysis and plugin bridge downloads.
analyzer.gradle.ssl.trust-store=
analyzer.gradle.ssl.trust-store-password=

# Inject plugin repositories via the analyzer init script before settings.gradle is
# evaluated. This can help repository plugin resolution without modifying target files.
analyzer.gradle.inject-plugin-repositories=true
analyzer.gradle.plugin-repository-urls=https://plugins.gradle.org/m2/
analyzer.gradle.add-maven-central-for-plugin-resolution=true

# Optional lightweight preflight check for statically discovered settings plugins.
analyzer.gradle.preflight-plugin-portal=false
analyzer.gradle.preflight-plugin-marker=true
analyzer.gradle.skip-gradle-if-required-settings-plugin-marker-unreachable=false

# Reuse safe proxy-related host Gradle settings in the analyzer's isolated GRADLE_USER_HOME.
analyzer.gradle.copy-host-gradle-proxy-properties=true
analyzer.gradle.copy-host-gradle-init-scripts=false
analyzer.gradle.copy-host-gradle-caches=false

# Prefetch declared Gradle plugins into a local analyzer-controlled Maven-style cache
# before Gradle configuration begins. This helps when the isolated Gradle environment
# cannot resolve plugin markers or implementation artifacts directly from the network.
analyzer.gradle.plugin-resolution-bridge.enabled=true
analyzer.gradle.plugin-resolution-bridge.retry-on-plugin-resolution-failure=true
analyzer.gradle.plugin-resolution-bridge.prefetch-before-gradle=true
analyzer.gradle.plugin-resolution-bridge.local-repository-name=Spring Boot Analyzer plugin cache
analyzer.gradle.plugin-resolution-bridge.repositories=https://plugins.gradle.org/m2/,https://repo.maven.apache.org/maven2/
analyzer.gradle.plugin-resolution-bridge.timeout=30s
analyzer.gradle.plugin-resolution-bridge.max-plugins=50
analyzer.gradle.plugin-resolution-bridge.max-artifacts=500
analyzer.gradle.plugin-resolution-bridge.redownload=false
analyzer.gradle.plugin-resolution-bridge.max-retries=2

# Last-resort settings plugin workarounds stay disabled by default. The primary fix for
# plugin resolution issues is the local plugin cache bridge above.
analyzer.gradle.settings-plugin-workarounds.enabled=false
analyzer.gradle.settings-plugin-workarounds.retry-on-failure=false
analyzer.gradle.settings-plugin-workarounds.known-nonessential-plugins=
analyzer.gradle.settings-plugin-workarounds.max-retries=1

# Hard timeout for the Gradle diagnostic task.
analyzer.gradle.timeout=120s

# Optional JAVA_HOME override for the Gradle diagnostic task. Leave blank to use the
# analyzer application's runtime JDK.
analyzer.gradle.java-home=

# When true, allow the analyzer to use the cloned repository's Gradle wrapper.
# This is higher risk than system Gradle because the wrapper script is repository-controlled.
analyzer.gradle.use-wrapper=false

# Optional explicit system Gradle executable path for external fallback execution.
analyzer.gradle.executable=

# When true, allow fallback to an externally installed Gradle executable after the
# preferred execution mode fails. Disabled by default to avoid assuming gradle.bat is installed.
analyzer.gradle.allow-system-gradle-fallback=false

# Allow Gradle dependency resolution to access the network.
analyzer.gradle.allow-network=true

# Maximum captured Gradle output retained for diagnostics after redaction.
analyzer.gradle.max-output-bytes=1048576

# Maximum number of resolved dependencies collected into the Gradle model report.
analyzer.gradle.max-resolved-dependencies=10000
